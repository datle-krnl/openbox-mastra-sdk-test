# SonarQube configuration for @openbox-ai/openbox-mastra-sdk
sonar.projectKey=openbox-mastra-sdk
sonar.projectName=openbox-mastra-sdk
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=test/**/*.test.ts
sonar.sourceEncoding=UTF-8

# TypeScript and coverage configuration
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=coverage/**,dist/**,docs/**,examples/**,node_modules/**,test/fixtures/**
sonar.coverage.exclusions=examples/**,test/**,eslint.config.js,tsup.config.ts,vitest.config.ts
