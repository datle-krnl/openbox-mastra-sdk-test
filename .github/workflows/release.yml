name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.10.0"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  GITLEAKS_VERSION: "8.30.0"

jobs:
  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ ! "${TAG_NAME}" =~ ${pattern} ]]; then
            echo "Invalid release tag: ${TAG_NAME}"
            echo "Expected format: <major>.<minor>.<patch>"
            exit 1
          fi

      - name: Verify governance files exist
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            ".github/CODEOWNERS"
            ".gitleaks.toml"
            "CODE_OF_CONDUCT.md"
            "LICENSE"
            "SECURITY.md"
            "package.json"
            "package-lock.json"
            "sonar-project.properties"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing required governance file: ${file}"
              exit 1
            fi
          done

      - name: Verify CODEOWNERS coverage for protected files
        shell: bash
        run: |
          set -euo pipefail
          declare -a required_patterns=(
            "/.github/workflows/"
            "/.github/CODEOWNERS"
            "/.gitleaks.toml"
            "/CODE_OF_CONDUCT.md"
            "/LICENSE"
            "/SECURITY.md"
            "/package.json"
            "/package-lock.json"
            "/sonar-project.properties"
          )
          for pattern in "${required_patterns[@]}"; do
            if ! awk '!/^#/ && NF >= 2 {print $1}' .github/CODEOWNERS | grep -Fxq "${pattern}"; then
              echo "Missing CODEOWNERS entry: ${pattern}"
              exit 1
            fi
          done

  release-quality:
    name: Release Quality
    runs-on: ubuntu-latest
    needs:
      - release-governance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI validation
        run: npm run ci:check

      - name: Verify package tarball
        run: npm run pack:check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  release-security:
    name: Release Security
    runs-on: ubuntu-latest
    needs:
      - release-governance
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.2

      - name: Run Trivy filesystem scan for console output
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format table \
            --exit-code 0

      - name: Run Trivy filesystem scan for SARIF
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format sarif \
            --output trivy-release-results.sarif \
            --exit-code 0

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-release-results.sarif
          category: trivy-release

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-release-results
          path: trivy-release-results.sarif
          if-no-files-found: error

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${archive}"
          tar -xzf "${archive}" gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks SARIF scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-release-results.sarif \
            --redact

      - name: Upload Gitleaks SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-release-results.sarif
          category: gitleaks-release

      - name: Upload Gitleaks SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-release-results
          path: gitleaks-release-results.sarif
          if-no-files-found: error

  release-sonarqube:
    name: Release SonarQube
    runs-on: ubuntu-latest
    needs:
      - release-quality
      - release-security

    steps:
      - name: Skip when SonarQube secrets are not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "Skipping SonarQube because SONAR_TOKEN or SONAR_HOST_URL is not configured."

      - name: Checkout repository
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/download-artifact@v4
        with:
          name: release-coverage-lcov
          path: coverage

      - name: Download Trivy SARIF artifact
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/download-artifact@v4
        with:
          name: trivy-release-results
          path: security-artifacts/trivy

      - name: Download Gitleaks SARIF artifact
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-release-results
          path: security-artifacts/gitleaks

      - name: Set up Java
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sarifReportPaths=security-artifacts/trivy/trivy-release-results.sarif,security-artifacts/gitleaks/gitleaks-release-results.sarif

  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: release
    needs:
      - release-governance
      - release-quality
      - release-security
      - release-sonarqube

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TAG_NAME}" != "${{ steps.package.outputs.version }}" ]; then
            echo "Tag version (${TAG_NAME}) does not match package.json version (${{ steps.package.outputs.version }})"
            exit 1
          fi

      - name: Read published npm version
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          published_version="$(npm view "${{ steps.package.outputs.name }}" version 2>/dev/null || true)"
          echo "published_version=${published_version}" >> "$GITHUB_OUTPUT"

      - name: Check GitHub release
        id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version already published
        if: steps.package.outputs.version == steps.npm.outputs.published_version
        run: echo "Version ${{ steps.package.outputs.version }} is already published. Skipping release."

      - name: Publish to npm
        if: steps.package.outputs.version != steps.npm.outputs.published_version
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.github_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
